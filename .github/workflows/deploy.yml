name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: parmelae-bot-production-deploy
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Run checks (type check, lint, test)
        run: bun run checks

      - name: Prepare release bundle
        run: |
          mkdir -p release
          rsync -a \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.github/' \
            --exclude '.cursor/' \
            --exclude '.devcontainer/' \
            --exclude '.taskmaster/' \
            --exclude '.vscode/' \
            --exclude 'backups/' \
            --exclude '.env' \
            --exclude 'prisma/sqlite.db' \
            ./ release/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: release
          if-no-files-found: error
          retention-days: 7

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: release

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync release to server
        env:
          DEPLOY_BASE: ${{ vars.DEPLOY_BASE }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          set -euo pipefail

          deploy_base="${DEPLOY_BASE:-/srv/parmelae-bot}"
          deploy_host="${DEPLOY_HOST:-jannis.rocks}"
          deploy_user="${DEPLOY_USER:-parmelae-bot}"
          release_id="${GITHUB_SHA}"
          remote_release_dir="${deploy_base}/releases/${release_id}"
          ssh_opts="-i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes"

          ssh $ssh_opts "${deploy_user}@${deploy_host}" "mkdir -p '${remote_release_dir}'"

          rsync -az --delete \
            -e "ssh $ssh_opts" \
            release/ \
            "${deploy_user}@${deploy_host}:${remote_release_dir}/"

      - name: Activate release
        env:
          DEPLOY_BASE: ${{ vars.DEPLOY_BASE }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          SERVICE_NAME: ${{ vars.PROD_SERVICE_NAME }}
        run: |
          set -euo pipefail

          deploy_base="${DEPLOY_BASE:-/srv/parmelae-bot}"
          deploy_host="${DEPLOY_HOST:-jannis.rocks}"
          deploy_user="${DEPLOY_USER:-parmelae-bot}"
          service_name="${SERVICE_NAME:-parmelae-bot}"
          release_id="${GITHUB_SHA}"
          remote_release_dir="${deploy_base}/releases/${release_id}"
          ssh_opts="-i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes"

          ssh $ssh_opts "${deploy_user}@${deploy_host}" "\
            chmod +x '${remote_release_dir}/deploy/activate-release.sh' && \
            '${remote_release_dir}/deploy/activate-release.sh' \
              --base-dir '${deploy_base}' \
              --release '${release_id}' \
              --service '${service_name}'"

      - name: Remove SSH config
        if: always()
        run: rm -rf ~/.ssh
